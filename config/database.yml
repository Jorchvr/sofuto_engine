# Configuración para Desarrollo y Pruebas (Usa SQLite localmente)
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

test:
  <<: *default
  database: storage/test.sqlite3

# Configuración para Render (Usa PostgreSQL)
production:
  primary: &production_db
    adapter: postgresql
    url: <%= ENV["DATABASE_URL"] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  
  # En Rails 8, los servicios "Solid" deben apuntar a Postgres en producción
  cache:
    <<: *production_db
  queue:
    <<: *production_db
  cable:
    <<: *production_db